<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Вибір</title>

<style>
body {
    background: #fff0f5;
    font-family: Arial;
    text-align: center;
    padding-top: 100px;
    overflow: hidden;
}

h1 {
    margin-bottom: 50px;
}

button {
    padding: 20px 40px;
    margin: 20px;
    font-size: 22px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

#yes {
    background: #ff4d88;
    color: white;
    transform: scale(1);
}

#no {
    background: #ccc;
    color: black;
    transform: scale(1);
}
</style>
</head>

<body>

<h1>Ти підеш зі мною гуляти? 💖</h1>

<button id="yes" onclick="goYes()">ТАК 💖</button>
<button id="no" onclick="pressNo()">НІ</button>

<script>

let yesScale = 1;
let noScale = 1;
let noOffset = 0;
let locked = false;

function pressNo() {

    if (locked) return;

    // НІ зменшується і "тікає" вліво
    noScale -= 0.05;
    noOffset -= 10;

    // ТАК збільшується
    yesScale += 0.08;

    // обмеження щоб не зламалось
    if (noScale < 0.3) noScale = 0.3;
    if (yesScale > 2.5) yesScale = 2.5;

    document.getElementById("no").style.transform =
        scale(${noScale}) translateX(${noOffset}px);

    document.getElementById("yes").style.transform =
        scale(${yesScale});
}

function goYes() {

    locked = true;

    // перекидає на 3 сторінку
    window.location.href = "page3.html";
}

</script>

</body>
</html>
