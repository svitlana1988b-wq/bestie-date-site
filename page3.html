<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Вибір зустрічі</title>

<style>
body {
    background: #fff0f5;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

.section {
    margin: 20px 0;
}

button {
    padding: 12px 18px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    background: #ffb6c1;
    font-size: 16px;
}

button:hover {
    background: #ff8aa1;
}

#confirm {
    margin-top: 30px;
    padding: 15px 25px;
    font-size: 18px;
    background: #ff69b4;
    color: white;
}
</style>
</head>

<body>

<h1>Обери зустріч 💖</h1>

<div class="section">
<h3>Дата</h3>
<button onclick="setDate('24 червня')">24</button>
<button onclick="setDate('25 червня')">25</button>
</div>

<div class="section">
<h3>Час</h3>
<button onclick="setTime('15:00')">15:00</button>
<button onclick="setTime('18:00')">18:00</button>
</div>

<div class="section">
<h3>Місце</h3>
<button onclick="setPlace('Каштани')">Каштани</button>
<button onclick="setPlace('Центр')">Центр</button>
<button onclick="setPlace('Маслозавод')">Маслозавод</button>
</div>

<button id="confirm" onclick="finish()">Підтвердити 💌</button>

<script>

let selectedDate = "";
let selectedTime = "";
let selectedPlace = "";

function setDate(d) {
    selectedDate = d;
}

function setTime(t) {
    selectedTime = t;
}

function setPlace(p) {
    selectedPlace = p;
}

function finish() {

    if (!selectedDate  !selectedTime  !selectedPlace) {
        alert("Спочатку обери все 💖");
        return;
    }

    fetch("https://script.google.com/macros/s/AKfycbxPTh1IRT-6Ns3G7HJhc5NN8t5rAvece7XFohLT6MueWsI2rIIuW1PIpe7ByvxyirCGeA/exec", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            date: selectedDate,
            time: selectedTime,
            place: selectedPlace
        })
    });

    alert("Готово 💖 я отримала твою відповідь!");
}

</script>

</body>
</html>
