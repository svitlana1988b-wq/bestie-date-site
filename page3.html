<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Зустріч</title>

<style>
body {
    background: #fff0f5;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

.section {
    margin: 25px 0;
}

.option {
    padding: 10px 14px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: #ffd1dc;
    cursor: pointer;
}

.option.active {
    background: #ff4d88;
    color: white;
}

#status {
    margin-top: 20px;
    font-size: 16px;
}

#confirm {
    margin-top: 25px;
    padding: 15px 25px;
    font-size: 18px;
    background: #ff4d88;
    color: white;
    border: none;
    border-radius: 12px;
}
</style>
</head>

<body>

<h1>Обери зустріч 💖</h1>

<div class="section">
<h3>Дата</h3>
<div id="dates"></div>
</div>

<div class="section">
<h3>Час</h3>
<button class="option" onclick="setTime(this,'12:00')">12:00</button>
<button class="option" onclick="setTime(this,'14:00')">14:00</button>
<button class="option" onclick="setTime(this,'16:00')">16:00</button>
<button class="option" onclick="setTime(this,'18:00')">18:00</button>
</div>

<div class="section">
<h3>Місце</h3>
<button class="option" onclick="setPlace(this,'Каштани')">Каштани</button>
<button class="option" onclick="setPlace(this,'Центр')">Центр</button>
<button class="option" onclick="setPlace(this,'Парк')">Парк</button>
</div>

<div id="status">
Дата: —<br>
Час: —<br>
Місце: —
</div>

<button id="confirm" onclick="finish()">Підтвердити 💌</button>

<script>

let selectedDate = "";
let selectedTime = "";
let selectedPlace = "";

function generateDates() {
    let container = document.getElementById("dates");

    let today = new Date();

    for (let i = 0; i < 14; i++) {
        let d = new Date();
        d.setDate(today.getDate() + i);

        let day = d.getDate() + "." + (d.getMonth()+1);

        let btn = document.createElement("button");
        btn.innerText = day;
        btn.className = "option";

        btn.onclick = function() {
            setDate(this, day);
        };

        container.appendChild(btn);
    }
}

function setDate(el, value) {
    selectedDate = value;
    highlight(el);
    update();
}

function setTime(el, value) {
    selectedTime = value;
    highlight(el);
    update();
}

function setPlace(el, value) {
    selectedPlace = value;
    highlight(el);
    update();
}

function highlight(el) {
    let group = el.parentElement.querySelectorAll("button");
    group.forEach(b => b.classList.remove("active"));
    el.classList.add("active");
}

function update() {
    document.getElementById("status").innerHTML =
        "Дата: " + (selectedDate || "—") + "<br>" +
        "Час: " + (selectedTime || "—") + "<br>" +
        "Місце: " + (selectedPlace || "—");
}

function finish() {

    if (!selectedDate  !selectedTime  !selectedPlace) {
        alert("Спочатку обери все 💖");
        return;
    }

    fetch("https://script.google.com/macros/s/AKfycbxeuKOiX_QmFLkwGrOUOVLeO1OHgDZHtuV1zc7iDR85zcuscTLd46Y5Tjv_JQfVj4w9uA/exec", {
        method: "POST",
        body: JSON.stringify({
            date: selectedDate,
            time: selectedTime,
            place: selectedPlace
        })
    });

    alert("Відправлено 💖");
}

generateDates();

</script>

</body>
</html>
